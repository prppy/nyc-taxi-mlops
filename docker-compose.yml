services:
  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  airflow-init:
    build:
      context: .
      dockerfile: source/dataops/Dockerfile
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow/source
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
    volumes:
      - ./.env:/opt/airflow/.env
      - ./source:/opt/airflow/source
      - ./source/dataops:/opt/airflow/dags
      - ./data:/opt/airflow/data
    command: >
      bash -c "airflow db init && airflow users create --username airflow --password airflow --firstname Airflow  --lastname Admin --role Admin --email airflow@example.com"

  airflow-webserver:
    build:
      context: .
      dockerfile: source/dataops/Dockerfile
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow/source
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://marquez-api:5000"}'
      OPENLINEAGE_URL: http://marquez-api:5000
      OPENLINEAGE_NAMESPACE: taxi_etl_project
    volumes:
      - ./.env:/opt/airflow/.env
      - ./source:/opt/airflow/source
      - ./source/dataops:/opt/airflow/dags
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: ["airflow", "webserver"]

  airflow-scheduler:
    build:
      context: .
      dockerfile: source/dataops/Dockerfile
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PYTHONPATH: /opt/airflow/source
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://marquez-api:5000"}'
      OPENLINEAGE_URL: http://marquez-api:5000
      OPENLINEAGE_NAMESPACE: taxi_etl_project
    volumes:
      - ./.env:/opt/airflow/.env
      - ./source:/opt/airflow/source
      - ./source/dataops:/opt/airflow/dags
      - ./data:/opt/airflow/data
    command: ["airflow", "scheduler"]

  mlops:
    build:
      context: .
      dockerfile: source/mlops/Dockerfile
    container_name: mlops_service
    working_dir: /app
    volumes:
      - ./source/mlops:/app
      - ./data:/app/data
    ports:
      - "8888:8888"
    command: bash

  devops:
    build:
      context: .
      dockerfile: source/devops/Dockerfile
    container_name: devops_frontend
    working_dir: /app
    volumes:
      - ./source/devops:/app
      - ./data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      - mlops
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501

  marquez-db:
    image: postgres:14
    container_name: marquez_db
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez-db-vol:/var/lib/postgresql/data

  marquez-api:
    image: marquezproject/marquez:0.43.0
    platform: linux/amd64
    container_name: marquez_api
    depends_on:
      - marquez-db
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      MARQUEZ_CONFIG: /opt/marquez/config.yml
    volumes:
      - ./config.yml:/opt/marquez/config.yml

  marquez-web:
    image: marquezproject/marquez-web:0.43.0
    platform: linux/amd64
    container_name: marquez_web
    depends_on:
      - marquez-api
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000

volumes:
  postgres-db-volume:
  marquez-db-vol: