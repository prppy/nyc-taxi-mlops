name: Model Sync, DevOps/MLOps Integration

# This workflow synchronises DevOps with MLOps:
# When a new model version is registered in MLflow, the application stack is redeployed to pick up the latest model.
# The application will then serve predictions using the latest deployed model setup.

# Trigger methods:
# 1. Automatic: Airflow register_model task calls GitHub API (repository_dispatch)
# 2. Manual: Click "Run workflow" in GitHub Actions UI (workflow_dispatch)

on:
  repository_dispatch:
    types: [model-updated]
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version that triggered this sync"
        required: false
        default: "latest"

jobs:
  sync-and-deploy:
    name: Sync Model & Redeploy App
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Log model sync event
        run: |
          echo "========================================"
          echo "  MODEL SYNC TRIGGERED"
          echo "========================================"
          echo "Trigger: ${{ github.event_name }}"
          echo "Model version: ${{ github.event.client_payload.model_version || inputs.model_version || 'latest' }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u)"
          echo "========================================"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Redeploy application
        run: |
          cd /home/githubrunner/nyc-taxi-mlops
          git pull origin main
          docker compose -f docker-compose.prod.yml pull frontend backend
          docker compose -f docker-compose.prod.yml up -d mlflow backend frontend

      - name: Verify deployment
        run: |
          sleep 10
          curl -f http://localhost:5000/ && echo "MLflow is running" || echo "MLflow health check pending"
          curl -f http://localhost:5002/ && echo "Backend is running" || echo "Backend health check pending"
          curl -f http://localhost:3001/ && echo "Frontend is running" || echo "Frontend health check pending"
          