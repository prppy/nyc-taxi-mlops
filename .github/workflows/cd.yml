name: CD Pipeline

# Continuous Deployment: Automatically builds and deploys application on merge to main

# Pipeline flow:
# 1. Build Docker images (runs on GitHub's servers)
# 2. Push images to GitHub Container Registry (ghcr.io)
# 3. Deploy to server (runs on your deployment machine via self-hosted runner)

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: source/devops/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nyc-taxi-frontend:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: source/devops/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nyc-taxi-backend:latest

  deploy:
    name: Deploy Services
    needs: build-and-push
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/nyc-taxi-frontend:latest
          docker pull ghcr.io/${{ github.repository_owner }}/nyc-taxi-backend:latest

      - name: Deploy application stack
        run: |
          cd /home/githubrunner/nyc-taxi-mlops
          git pull origin main
          docker compose -f docker-compose.prod.yml pull frontend backend
          docker compose -f docker-compose.prod.yml up -d --build airflow-webserver airflow-scheduler
          docker compose -f docker-compose.prod.yml up -d mlflow backend frontend

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:8080/ || echo "Airflow health check pending"
          curl -f http://localhost:5000/ || echo "MLflow health check pending"
          curl -f http://localhost:5002/ || echo "Backend health check pending"
          curl -f http://localhost:3001/ || echo "Frontend health check pending"
