name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/devops/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source/devops/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  python-lint-and-test:
    name: Python Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install ruff pytest flask
      - name: Lint Python code
        run: ruff check source/
      - name: Run tests
        run: pytest tests/ -v

  dag-validation:
    name: DAG Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install pytest
      - name: Validate DAG files
        run: pytest source/devops/tests/test_dag_import.py -v

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -f source/devops/Dockerfile.frontend .
      - name: Build backend image
        run: docker build -f source/devops/Dockerfile.backend .
