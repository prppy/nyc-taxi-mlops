services:
  airflow-init:
    build:
      context: .
      dockerfile: source/dataops/Dockerfile
    container_name: airflow_init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_URL}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      PYTHONPATH: /opt/airflow/source
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
      MLFLOW_TRACKING_URI: http://mlflow:5000
      WATERMARK_SECRET_KEY: ${WATERMARK_SECRET_KEY}
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./.env:/opt/airflow/.env
      - ./source:/opt/airflow/source
      - ./source/dataops:/opt/airflow/dags/dataops
      - ./source/mlops/dags:/opt/airflow/dags/mlops
      - ./data:/opt/airflow/data
      - ./source/mlops/mlruns:/mlflow
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "airflow db init && 
      airflow db migrate &&
      airflow users create
      --username airflow
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Admin
      --lastname User
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL} || true &&
      airflow pools set global_serial_pool 1 'Serialize Spark-heavy tasks across all DAGs'
      "
    networks:
      - appnet

  airflow-webserver:
    build:
      context: .
      dockerfile: source/dataops/Dockerfile
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
      - mlflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_URL}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      PYTHONPATH: /opt/airflow/source
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
      MLFLOW_TRACKING_URI: http://mlflow:5000
      WATERMARK_SECRET_KEY: ${WATERMARK_SECRET_KEY}
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./.env:/opt/airflow/.env
      - ./source:/opt/airflow/source
      - ./source/dataops:/opt/airflow/dags/dataops
      - ./source/mlops/dags:/opt/airflow/dags/mlops
      - ./data:/opt/airflow/data
      - ./source/mlops/mlruns:/mlflow
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: ["airflow", "webserver"]
    networks:
      - appnet

  airflow-scheduler:
    build:
      context: .
      dockerfile: source/dataops/Dockerfile
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
      - mlflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_URL}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      PYTHONPATH: /opt/airflow/source
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
      MLFLOW_TRACKING_URI: http://mlflow:5000
      WATERMARK_SECRET_KEY: ${WATERMARK_SECRET_KEY}
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./.env:/opt/airflow/.env
      - ./source:/opt/airflow/source
      - ./source/dataops:/opt/airflow/dags/dataops
      - ./source/mlops/dags:/opt/airflow/dags/mlops
      - ./data:/opt/airflow/data
      - ./source/mlops/mlruns:/mlflow
      - ./logs:/opt/airflow/logs
    command: ["airflow", "scheduler"]
    networks:
      - appnet

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: mlflow
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./source/mlops/mlruns:/mlflow/artifacts
    command: >
      sh -c "
      pip install psycopg2-binary &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri ${MLFLOW_DB_URL}
      --default-artifact-root /mlflow/artifacts
      "
    networks:
      - appnet

  backend:
    build:
      context: .
      dockerfile: source/devops/Dockerfile.backend
    container_name: backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
      - ./source:/opt/airflow/source
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - .:/app
    ports:
      - "5002:5000"
    command: python source/devops/backend/app.py
    depends_on:
      - mlflow
    networks:
      - appnet

  frontend:
    build:
      context: .
      dockerfile: source/devops/Dockerfile.frontend
    container_name: frontend
    restart: unless-stopped
    working_dir: /app/source/devops/frontend
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/source/devops/frontend/node_modules
    ports:
      - "3001:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet: