version: "3.9"

services:
  airflow-init:
    build:
      context: .
      dockerfile: ./docker/airflow/Dockerfile
    container_name: airflow_init
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${DATABASE_URL}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Admin
      --lastname User
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL}
      "
    volumes:
      - ./source:/opt/airflow/source
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    networks:
      - appnet

  airflow-webserver:
    build:
      context: .
      dockerfile: ./docker/airflow/Dockerfile
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
      - mlflow
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${DATABASE_URL}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW__SMTP__SMTP_HOST}
      AIRFLOW__SMTP__SMTP_USER: ${AIRFLOW__SMTP__SMTP_USER}
      AIRFLOW__SMTP__SMTP_PASSWORD: ${AIRFLOW__SMTP__SMTP_PASSWORD}
      AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW__SMTP__SMTP_PORT}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      WATERMARK_SECRET_KEY: ${WATERMARK_SECRET_KEY}
      GIT_PYTHON_REFRESH: ${GIT_PYTHON_REFRESH}
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./source:/opt/airflow/source
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - appnet

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./docker/airflow/Dockerfile
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
      - mlflow
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${DATABASE_URL}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      WATERMARK_SECRET_KEY: ${WATERMARK_SECRET_KEY}
      GIT_PYTHON_REFRESH: ${GIT_PYTHON_REFRESH}
    command: scheduler
    volumes:
      - ./source:/opt/airflow/source
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - appnet

  mlflow:
    build:
      context: .
      dockerfile: ./docker/mlflow/Dockerfile
    container_name: mlflow
    restart: unless-stopped
    env_file:
      - .env
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri ${DATABASE_URL}
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - appnet

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:

volumes:
  mlflow_artifacts: